<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Quoting Pipeline Schema</title>
  <desc id="desc">Professional overview of the RFQ to quotation pipeline, including extraction, matching, pricing, rendering, review and approval.</desc>
  <defs>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b45309"/>
    </marker>
    <marker id="arrow-slate" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .band { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.5; }
      .card { fill: #ffffff; stroke: #dbe3ee; stroke-width: 1.5; filter: url(#shadow); }
      .card-blue { stroke: #93c5fd; }
      .card-teal { stroke: #5eead4; }
      .card-amber { stroke: #fbbf24; }
      .card-green { stroke: #86efac; }
      .side { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.2; }
      .chip { fill: #eef2ff; stroke: #c7d2fe; stroke-width: 1; }
      .chip-teal { fill: #ecfdf5; stroke: #99f6e4; stroke-width: 1; }
      .chip-amber { fill: #fffbeb; stroke: #fde68a; stroke-width: 1; }
      .chip-green { fill: #f0fdf4; stroke: #bbf7d0; stroke-width: 1; }
      .title { font-family: Arial; font-size: 32px; font-weight: 700; fill: #0f172a; letter-spacing: 0; }
      .subtitle { font-family: Arial; font-size: 15px; font-weight: 400; fill: #64748b; letter-spacing: 0; }
      .section { font-family: Arial; font-size: 13px; font-weight: 700; fill: #334155; letter-spacing: 1.4px; text-transform: uppercase; }
      .h { font-family: Arial; font-size: 18px; font-weight: 700; fill: #0f172a; letter-spacing: 0; }
      .h-sm { font-family: Arial; font-size: 15px; font-weight: 700; fill: #0f172a; letter-spacing: 0; }
      .body { font-family: Arial; font-size: 13px; font-weight: 400; fill: #475569; letter-spacing: 0; }
      .body-strong { font-family: Arial; font-size: 13px; font-weight: 700; fill: #1e293b; letter-spacing: 0; }
      .mini { font-family: Arial; font-size: 11px; font-weight: 600; fill: #64748b; letter-spacing: 0; }
      .mono { font-family: Courier; font-size: 12px; font-weight: 600; fill: #334155; letter-spacing: 0; }
      .num { font-family: Arial; font-size: 14px; font-weight: 800; fill: #ffffff; letter-spacing: 0; }
      .arrow-blue { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrow-blue); }
      .arrow-amber { stroke: #b45309; stroke-width: 3; fill: none; marker-end: url(#arrow-amber); }
      .arrow-slate { stroke: #64748b; stroke-width: 2.2; fill: none; marker-end: url(#arrow-slate); }
      .arrow-dashed { stroke-dasharray: 7 7; }
      .accent-blue { fill: #2563eb; }
      .accent-teal { fill: #0f766e; }
      .accent-amber { fill: #b45309; }
      .accent-green { fill: #15803d; }
      .muted-line { stroke: #cbd5e1; stroke-width: 1.2; fill: none; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="980"/>

  <text x="64" y="58" class="title">Quoting Pipeline: Anfrage zu Angebot</text>
  <text x="64" y="86" class="subtitle">End-to-end Ablauf aus dem Code: Mail-Ingestion, Extraktion, Matching, Preisberechnung, PDF-Erstellung und Human-in-the-loop Review.</text>

  <rect x="48" y="122" width="1504" height="410" rx="8" class="band"/>
  <text x="72" y="154" class="section">Automatisierte Draft-Erstellung</text>

  <rect x="64" y="184" width="205" height="138" rx="8" class="card card-blue"/>
  <circle cx="92" cy="214" r="15" class="accent-blue"/>
  <text x="87" y="219" class="num">0</text>
  <text x="118" y="214" class="h">Eingang</text>
  <text x="88" y="248" class="body">Outlook Add-in, Upload</text>
  <text x="88" y="270" class="body">oder CLI erzeugen ein</text>
  <text x="88" y="292" class="body-strong">Mail-Objekt</text>

  <rect x="318" y="184" width="214" height="138" rx="8" class="card card-blue"/>
  <circle cx="346" cy="214" r="15" class="accent-blue"/>
  <text x="341" y="219" class="num">1</text>
  <text x="372" y="214" class="h">Mail vorbereiten</text>
  <text x="342" y="248" class="body">Anhänge speichern</text>
  <text x="342" y="270" class="body">Review-Ordner anlegen</text>
  <text x="342" y="292" class="mono">mail.json</text>

  <rect x="582" y="154" width="260" height="198" rx="8" class="card card-teal"/>
  <circle cx="610" cy="184" r="15" class="accent-teal"/>
  <text x="605" y="189" class="num">2</text>
  <text x="636" y="184" class="h">Extraktion</text>
  <text x="606" y="218" class="body-strong">Fast-Path zuerst</text>
  <text x="606" y="240" class="body">Aho-Corasick über bekannte</text>
  <text x="606" y="262" class="body">Artikelnummern + Mengenfenster</text>
  <line x1="606" y1="278" x2="818" y2="278" class="muted-line"/>
  <text x="606" y="304" class="body-strong">Fallback: LLM</text>
  <text x="606" y="326" class="body">PDF/Bild als Vision Input,</text>
  <text x="606" y="348" class="body">Excel/CSV als Markdown</text>

  <rect x="892" y="184" width="214" height="138" rx="8" class="card card-blue"/>
  <circle cx="920" cy="214" r="15" class="accent-blue"/>
  <text x="915" y="219" class="num">3</text>
  <text x="946" y="214" class="h">Matching</text>
  <text x="916" y="248" class="body">Exakt auf Artikelnummer</text>
  <text x="916" y="270" class="body">Fuzzy auf Artikelnummer</text>
  <text x="916" y="292" class="body">Kontext: Bezeichnung,</text>
  <text x="916" y="314" class="body">Werkstoff, Abmessungen</text>

  <rect x="1156" y="184" width="214" height="138" rx="8" class="card card-blue"/>
  <circle cx="1184" cy="214" r="15" class="accent-blue"/>
  <text x="1179" y="219" class="num">4</text>
  <text x="1210" y="214" class="h">Preisberechnung</text>
  <text x="1180" y="248" class="body">Basispreis aus Stammdaten</text>
  <text x="1180" y="270" class="body">oder Preis-Override</text>
  <text x="1180" y="292" class="body">Mengenrabatt, ZKALK,</text>
  <text x="1180" y="314" class="body">Zertifikatslogik</text>

  <rect x="1420" y="184" width="108" height="138" rx="8" class="card card-green"/>
  <circle cx="1448" cy="214" r="15" class="accent-green"/>
  <text x="1443" y="219" class="num">5</text>
  <text x="1440" y="248" class="h-sm">PDF</text>
  <text x="1440" y="272" class="h-sm">Draft</text>
  <text x="1440" y="302" class="body">roter</text>
  <text x="1440" y="322" class="body">AI-Hinweis</text>

  <path d="M 270 253 L 316 253" class="arrow-blue"/>
  <path d="M 532 253 L 580 253" class="arrow-blue"/>
  <path d="M 842 253 L 890 253" class="arrow-blue"/>
  <path d="M 1106 253 L 1154 253" class="arrow-blue"/>
  <path d="M 1370 253 L 1418 253" class="arrow-blue"/>

  <rect x="78" y="386" width="232" height="86" rx="8" class="side"/>
  <text x="96" y="414" class="h-sm">Progress &amp; Status</text>
  <text x="96" y="438" class="mono">progress.json</text>
  <text x="96" y="460" class="body">started / completed / failed</text>

  <rect x="350" y="386" width="214" height="86" rx="8" class="chip-teal"/>
  <text x="368" y="414" class="h-sm">Extraktions-Artefakt</text>
  <text x="368" y="438" class="mono">01_extracted.json</text>
  <text x="368" y="460" class="body">validiertes Anfrage-Schema</text>

  <rect x="602" y="386" width="214" height="86" rx="8" class="chip"/>
  <text x="620" y="414" class="h-sm">Matching-Artefakt</text>
  <text x="620" y="438" class="mono">02_matches.json</text>
  <text x="620" y="460" class="body">exact, fuzzy, semantic, no_match</text>

  <rect x="854" y="386" width="214" height="86" rx="8" class="chip"/>
  <text x="872" y="414" class="h-sm">Preis-Artefakt</text>
  <text x="872" y="438" class="mono">03_quotation.json</text>
  <text x="872" y="460" class="body">Positionen, Margen, Warnungen</text>

  <rect x="1106" y="386" width="214" height="86" rx="8" class="chip-green"/>
  <text x="1124" y="414" class="h-sm">PDF-Artefakt</text>
  <text x="1124" y="438" class="mono">*_ANGEBOT_DRAFT.pdf</text>
  <text x="1124" y="460" class="body">Review-fähiges Angebot</text>

  <rect x="1360" y="374" width="168" height="110" rx="8" class="side"/>
  <text x="1378" y="402" class="h-sm">Stammdaten</text>
  <text x="1378" y="426" class="mono">stammdaten.csv</text>
  <text x="1378" y="448" class="body">Artikel, Werkstoff,</text>
  <text x="1378" y="468" class="body">Preis, Abmessungen</text>

  <path d="M 1444 374 C 1444 342, 996 342, 996 324" class="arrow-slate arrow-dashed"/>
  <path d="M 1444 374 C 1444 338, 706 374, 706 354" class="arrow-slate arrow-dashed"/>
  <path d="M 1444 374 C 1444 342, 1264 342, 1264 324" class="arrow-slate arrow-dashed"/>

  <rect x="48" y="576" width="1504" height="300" rx="8" class="band"/>
  <text x="72" y="608" class="section">Human-in-the-loop Review und Freigabe</text>

  <rect x="78" y="640" width="220" height="126" rx="8" class="card card-amber"/>
  <circle cx="106" cy="670" r="15" class="accent-amber"/>
  <text x="101" y="675" class="num">6</text>
  <text x="132" y="670" class="h">Review UI</text>
  <text x="102" y="704" class="body">Originalquelle, Draft-PDF</text>
  <text x="102" y="726" class="body">und extrahierte Positionen</text>
  <text x="102" y="748" class="body">nebeneinander prüfen</text>

  <rect x="362" y="640" width="230" height="126" rx="8" class="card card-amber"/>
  <circle cx="390" cy="670" r="15" class="accent-amber"/>
  <text x="385" y="675" class="num">7</text>
  <text x="416" y="670" class="h">Korrekturen</text>
  <text x="386" y="704" class="mono">anfrage_reviewed.json</text>
  <text x="386" y="726" class="mono">matches_reviewed.json</text>
  <text x="386" y="748" class="mono">manual_overrides.json</text>

  <rect x="656" y="640" width="238" height="126" rx="8" class="card card-amber"/>
  <circle cx="684" cy="670" r="15" class="accent-amber"/>
  <text x="679" y="675" class="num">8</text>
  <text x="710" y="670" class="h">Regenerate</text>
  <text x="680" y="704" class="body">Preis neu berechnen</text>
  <text x="680" y="726" class="body">mit manuellen Overrides</text>
  <text x="680" y="748" class="mono">quotation_reviewed.json</text>

  <rect x="958" y="640" width="238" height="126" rx="8" class="card card-green"/>
  <circle cx="986" cy="670" r="15" class="accent-green"/>
  <text x="981" y="675" class="num">9</text>
  <text x="1012" y="670" class="h">Freigabe</text>
  <text x="982" y="704" class="body">Final-PDF ohne AI-Hinweis</text>
  <text x="982" y="726" class="body">Approval-State:</text>
  <text x="982" y="748" class="mono">approved</text>

  <rect x="1260" y="640" width="238" height="126" rx="8" class="card card-green"/>
  <circle cx="1288" cy="670" r="15" class="accent-green"/>
  <text x="1283" y="675" class="num">10</text>
  <text x="1314" y="670" class="h">Outlook Versand</text>
  <text x="1284" y="704" class="body">Add-in pollt Approval</text>
  <text x="1284" y="726" class="body">und erstellt Angebotsmail</text>
  <text x="1284" y="748" class="mono">ready_to_send</text>

  <path d="M 298 703 L 360 703" class="arrow-amber"/>
  <path d="M 592 703 L 654 703" class="arrow-amber"/>
  <path d="M 894 703 L 956 703" class="arrow-amber"/>
  <path d="M 1196 703 L 1258 703" class="arrow-amber"/>

  <path d="M 775 640 C 775 600, 188 600, 188 638" class="arrow-amber arrow-dashed"/>
  <text x="410" y="594" class="mini">erneut prüfen</text>

  <rect x="84" y="806" width="296" height="42" rx="8" class="chip-amber"/>
  <text x="104" y="832" class="body-strong">Statusmaschine:</text>
  <text x="216" y="832" class="body">draft_generated -> reviewed -> approved -> ready_to_send</text>

  <rect x="420" y="806" width="314" height="42" rx="8" class="chip"/>
  <text x="440" y="832" class="body-strong">Qualitätssicherung:</text>
  <text x="568" y="832" class="body">Quality Gate, Warnungen, manuelle Preisprüfung</text>

  <rect x="774" y="806" width="356" height="42" rx="8" class="chip-green"/>
  <text x="794" y="832" class="body-strong">Final Output:</text>
  <text x="890" y="832" class="body">freigegebenes PDF + vorbereitete Kundenmail</text>

  <rect x="1170" y="806" width="328" height="42" rx="8" class="chip"/>
  <text x="1190" y="832" class="body-strong">Audit Trail:</text>
  <text x="1270" y="832" class="body">Source Quotes, Changed Fields, Approval History</text>

  <rect x="64" y="914" width="350" height="30" rx="8" class="chip-teal"/>
  <text x="84" y="934" class="mini">Deterministisch: Fast-Path, Matching, Pricing, PDF</text>
  <rect x="444" y="914" width="330" height="30" rx="8" class="chip"/>
  <text x="464" y="934" class="mini">LLM nur für strukturierte Extraktion</text>
  <rect x="804" y="914" width="330" height="30" rx="8" class="chip-amber"/>
  <text x="824" y="934" class="mini">Mensch prüft und korrigiert vor Freigabe</text>
  <rect x="1164" y="914" width="364" height="30" rx="8" class="chip-green"/>
  <text x="1184" y="934" class="mini">Freigabe erzeugt finale, versandfertige Artefakte</text>
</svg>
