<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" role="img" aria-labelledby="title desc">
  <title id="title">Kompaktes Pipeline-Schema</title>
  <desc id="desc">Compact step overview of the quoting pipeline from customer request to ready-to-send quotation.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <filter id="soft-shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.5; }
      .step { fill: #ffffff; stroke-width: 1.5; filter: url(#soft-shadow); }
      .step-blue { stroke: #93c5fd; }
      .step-teal { stroke: #5eead4; }
      .step-amber { stroke: #fbbf24; }
      .step-green { stroke: #86efac; }
      .title { font-family: Arial; font-size: 31px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-family: Arial; font-size: 15px; font-weight: 400; fill: #64748b; }
      .label { font-family: Arial; font-size: 12px; font-weight: 700; fill: #475569; letter-spacing: 1.2px; }
      .h { font-family: Arial; font-size: 18px; font-weight: 700; fill: #0f172a; }
      .body { font-family: Arial; font-size: 12px; font-weight: 400; fill: #64748b; }
      .chip { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.2; }
      .chip-text { font-family: Arial; font-size: 12px; font-weight: 600; fill: #475569; }
      .mono { font-family: Courier; font-size: 11px; font-weight: 600; fill: #334155; }
      .num { font-family: Arial; font-size: 14px; font-weight: 800; fill: #ffffff; }
      .blue { fill: #2563eb; }
      .teal { fill: #0f766e; }
      .amber { fill: #b45309; }
      .green { fill: #15803d; }
      .arrow { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1500" height="500"/>

  <text x="56" y="58" class="title">Quoting Pipeline at a Glance</text>
  <text x="56" y="84" class="subtitle">From customer request to reviewed and approved quotation.</text>

  <rect x="46" y="118" width="1408" height="292" rx="10" class="panel"/>
  <text x="70" y="150" class="label">Core Flow</text>

  <rect x="76" y="190" width="176" height="112" rx="8" class="step step-blue"/>
  <circle cx="108" cy="236" r="16" class="blue"/>
  <text x="104" y="241" class="num">1</text>
  <text x="136" y="232" class="h">Request</text>
  <text x="136" y="258" class="body">Mail + attachments</text>

  <rect x="314" y="190" width="176" height="112" rx="8" class="step step-teal"/>
  <circle cx="346" cy="236" r="16" class="teal"/>
  <text x="342" y="241" class="num">2</text>
  <text x="374" y="232" class="h">Extraction</text>
  <text x="374" y="258" class="body">Fast-Path / LLM</text>

  <rect x="552" y="190" width="176" height="112" rx="8" class="step step-blue"/>
  <circle cx="584" cy="236" r="16" class="blue"/>
  <text x="580" y="241" class="num">3</text>
  <text x="612" y="232" class="h">Matching</text>
  <text x="612" y="258" class="body">Master data</text>

  <rect x="790" y="190" width="176" height="112" rx="8" class="step step-blue"/>
  <circle cx="822" cy="236" r="16" class="blue"/>
  <text x="818" y="241" class="num">4</text>
  <text x="850" y="232" class="h">Pricing</text>
  <text x="850" y="258" class="body">Discount + ZKALK</text>

  <rect x="1028" y="190" width="176" height="112" rx="8" class="step step-amber"/>
  <circle cx="1060" cy="236" r="16" class="amber"/>
  <text x="1056" y="241" class="num">5</text>
  <text x="1088" y="232" class="h">Review</text>
  <text x="1088" y="258" class="body">Check + adjust</text>

  <rect x="1266" y="190" width="176" height="112" rx="8" class="step step-green"/>
  <circle cx="1298" cy="236" r="16" class="green"/>
  <text x="1294" y="241" class="num">6</text>
  <text x="1326" y="232" class="h">Final</text>
  <text x="1326" y="258" class="body">PDF + email</text>

  <path d="M 252 236 L 312 236" class="arrow"/>
  <path d="M 490 236 L 550 236" class="arrow"/>
  <path d="M 728 236 L 788 236" class="arrow"/>
  <path d="M 966 236 L 1026 236" class="arrow"/>
  <path d="M 1204 236 L 1264 236" class="arrow"/>

  <rect x="174" y="344" width="222" height="38" rx="8" class="chip"/>
  <text x="192" y="368" class="chip-text">LLM only for extraction</text>

  <rect x="430" y="344" width="258" height="38" rx="8" class="chip"/>
  <text x="448" y="368" class="chip-text">Matching &amp; pricing deterministic</text>

  <rect x="722" y="344" width="230" height="38" rx="8" class="chip"/>
  <text x="740" y="368" class="chip-text">Review remains auditable</text>

</svg>
